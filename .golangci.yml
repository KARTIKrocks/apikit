version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - gocyclo
    - revive
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
          disabled: true
  formatters:
    enable:
      - gofmt
      - goimports
  exclusions:
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - errcheck
        path: examples/
